name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Verify tag matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag=$TAG_VERSION pkg=$PKG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch — bump package.json to $TAG_VERSION before tagging."
            exit 1
          fi

      - name: Determine npm dist-tag (latest vs rehearsal)
        id: npm_tag
        # Pre-release tags like v0.1.0-rc.1 publish under the `rehearsal`
        # dist-tag so `npm install remark-dgmo` keeps resolving to the most
        # recent stable. Plain `vX.Y.Z` tags publish under `latest`.
        # Promote a rehearsal to stable by tagging the same commit `vX.Y.Z`
        # (no leading rc suffix) and running this workflow again.
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *-rc* || "$TAG" == *-rehearsal* ]]; then
            echo "tag=rehearsal" >> "$GITHUB_OUTPUT"
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm
        # Auth via NODE_AUTH_TOKEN sourced from the org-level NPM_TOKEN
        # secret (granular access token covering all @diagrammo/* +
        # sibling wrapper packages). Provenance is off — switching from
        # OIDC trusted-publishing to a shared token in exchange for
        # not having to pre-configure each new package on npmjs.com.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag "${{ steps.npm_tag.outputs.tag }}"

      - name: Wait for npm propagation
        run: |
          for i in 1 2 3 4 5 6; do
            if npm view "remark-dgmo@${GITHUB_REF_NAME#v}" version >/dev/null 2>&1; then
              echo "✓ npm shows ${GITHUB_REF_NAME#v}"
              exit 0
            fi
            echo "Waiting for npm registry... ($i/6)"
            sleep 10
          done
          echo "::warning::npm did not surface the new version within 60s — proceeding anyway"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.npm_tag.outputs.prerelease == 'true' }}
