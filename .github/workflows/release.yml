name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Verify tag matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag=$TAG_VERSION pkg=$PKG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch — bump package.json to $TAG_VERSION before tagging."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm
        # Auth via OIDC (Trusted Publishers configured on npmjs.com).
        # Node 24 ships with npm 11.x which has trusted-publisher support.
        run: npm publish --access public --provenance

      - name: Wait for npm propagation
        run: |
          for i in 1 2 3 4 5 6; do
            if npm view "remark-dgmo@${GITHUB_REF_NAME#v}" version >/dev/null 2>&1; then
              echo "✓ npm shows ${GITHUB_REF_NAME#v}"
              exit 0
            fi
            echo "Waiting for npm registry... ($i/6)"
            sleep 10
          done
          echo "::warning::npm did not surface the new version within 60s — proceeding anyway"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
