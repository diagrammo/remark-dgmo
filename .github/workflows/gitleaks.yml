name: Secret scan

# Push/PR triggers removed 2026-07-22 — per-push scans across every repo were
# the org's biggest hidden Actions-minutes line item. Weekly sweep + manual
# dispatch give the same coverage for a single-committer org.
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Detect secrets
        run: gitleaks detect --redact --verbose
